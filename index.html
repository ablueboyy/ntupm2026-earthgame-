<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流唱營：尋回失竊的樂章</title>
    <style>
        :root {
            --bg-color: #2c3e50; /* 配合火車夜間/懸疑氛圍，底色改為深藍灰 */
            --panel-bg: #34495e;
            --primary-color: #f1c40f; /* 探照燈/雷達的黃色 */
            --secondary-color: #e67e22;
            --accent-color: #e74c3c;
            --cell-bg: #ecf0f1;
            --cell-hover: #bdc3c7;
            --text-color: #ecf0f1;
            --instrument-color: #f39c12;
        }

        body {
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 { margin-top: 10px; color: var(--primary-color); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        h3 { color: var(--secondary-color); margin-top: 0; margin-bottom: 10px; }

        /* 故事背景區塊 */
        #story-box {
            max-width: 600px;
            margin: 0 auto 20px auto;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            color: #ddd;
        }

        #controls {
            margin: 0 auto 20px auto;
            padding: 20px;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: inline-block;
            border: 1px solid #7f8c8d;
            min-width: 320px;
        }

        .info-list {
            text-align: left;
            margin: 10px auto 15px auto;
            background: rgba(0, 0, 0, 0.25);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            border: 1px solid #7f8c8d;
        }
        .inventory-header {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-color);
            border-bottom: 1px solid #7f8c8d;
            padding-bottom: 4px;
        }
        .inventory-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            color: var(--text-color);
        }
        .limit-reached { color: #e74c3c; font-weight: bold; }

        select, button {
            padding: 10px 15px;
            font-size: 16px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #7f8c8d;
            background-color: #2c3e50;
            color: var(--text-color);
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        select:focus { border-color: var(--primary-color); }

        button {
            background: linear-gradient(45deg, var(--secondary-color), #d35400);
            color: #fff;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover { box-shadow: 0 0 10px var(--secondary-color); transform: translateY(-2px); }
        button:active { transform: translateY(1px); }

        /* 關主按鈕樣式 */
        .gm-btn {
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            margin: 5px 2px;
            border-radius: 6px;
            color: white;
            border: none;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .btn-win { background: #27ae60; }
        .btn-win:hover { background: #2ecc71; box-shadow: 0 0 8px #2ecc71;}
        .btn-lose { background: #d35400; }
        .btn-lose:hover { background: #e67e22; box-shadow: 0 0 8px #e67e22;}
        .btn-secret { background: #8e44ad; }
        .btn-secret:hover { background: #9b59b6; box-shadow: 0 0 8px #9b59b6;}
        .btn-undo { background: #c0392b; }
        .btn-undo:hover { background: #e74c3c; box-shadow: 0 0 8px #e74c3c;}
        .btn-settle { background: #7f8c8d; width: 95%; margin-top: 10px; }
        .btn-settle:hover { background: #95a5a6; box-shadow: 0 0 8px #95a5a6;}

        .stats {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .stat-item {
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 20px;
            width: 80%;
        }
        #score-display { color: #50fa7b; font-size: 22px; text-shadow: 0 0 5px #50fa7b; }
        #moves-display { color: var(--primary-color); font-size: 22px; }
        
        #board-container {
            position: relative;
            display: inline-block;
            padding: 10px;
            background: #1a252f;
            border-radius: 10px;
            border: 2px solid #34495e;
            max-width: 100%;
            overflow-x: auto;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 35px);
            grid-template-rows: repeat(15, 35px);
            grid-gap: 3px;
            justify-content: center;
            min-width: max-content; 
        }

        .cell {
            width: 35px;
            height: 35px;
            background-color: var(--cell-bg);
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px; 
            color: #2c3e50; /* 數字顏色深一點 */
            user-select: none; 
        }

        .cell:hover:not(.revealed):not(.setup-treasure):not(.preview-valid):not(.preview-invalid) {
            background-color: var(--cell-hover);
        }
        
        .cell.setup-treasure {
            background-color: var(--instrument-color);
            border: 1px solid #fff;
        }

        .cell.preview-valid { background-color: rgba(241, 196, 15, 0.6); border: 2px dashed #f39c12; box-sizing: border-box; }
        .cell.preview-invalid { background-color: rgba(231, 76, 60, 0.5); border: 2px dashed #c0392b; box-sizing: border-box; cursor: not-allowed; }

        .cell.revealed { cursor: not-allowed; box-shadow: none; }

        .cell.miss { background-color: #7f8c8d; } /* 沒中變成深灰色荒地 */
        .n1 { color: #3498db; }
        .n2 { color: #2ecc71; }
        .n3 { color: #e74c3c; }
        .n4 { color: #9b59b6; }
        .n5 { color: #f39c12; font-weight: 900; }
        .n6, .n7, .n8 { color: #e67e22; font-weight: 900; }

        .cell.hit { background-color: #f1c40f; color: #000; animation: hitPop 0.3s ease; }
        .cell.completed { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; color: #000; }
        
        @keyframes hitPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background-color: #fff; }
            100% { transform: scale(1); }
        }

        #message {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 10px;
            min-height: 25px;
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.4);
        }
    </style>
</head>
<body>

    <h1>🚂 流唱特快車：尋回失竊的樂章</h1>

    <div id="story-box">
        <strong>⚠️ 突發狀況！</strong><br>
        各位旅客請注意，特快車已緊急停靠。前方準備在今晚開唱的樂團遭到襲擊，他們的樂器全被神祕的「怪盜」偷走，並就近掩埋在車站外的荒野中了！<br>
        請各位小隊員立刻出動，透過大地任務獲取「雷達電量 (步數)」，掃描這片荒野，幫樂團找回失竊的樂器吧！
    </div>

    <div id="controls">
        <div id="setup-panel">
            <h3>🧳 第一階段：怪盜藏匿點 (關主設定)</h3>
            
            <div id="inventory-list" class="info-list"></div>

            <select id="treasure-type">
                <option value="1,1,🎤">🎤 麥克風 (1x1) - 1分</option>
                <option value="2,1,🎸">🎸 電吉他 (2x1 橫) - 3分</option>
                <option value="1,2,🪕">🪕 貝斯 (1x2 直) - 3分</option>
                <option value="3,1,🎹">🎹 電子琴 (3x1 橫) - 6分</option>
                <option value="2,2,🥁">🥁 爵士鼓 (2x2 方塊) - 10分</option>
                <option value="2,3,📻">📻 監聽音箱 (2寬x3高) - 15分</option>
            </select>
            <button onclick="startGame()">佈置完成，啟動小隊雷達</button>
            <p style="font-size:14px; color:#bdc3c7; margin-top:15px; line-height: 1.5;">
                🔹 關主請在下方 15x15 的荒野中配置被偷走的器材。<br>
                ✨ 開始後，系統將隨機空降 **怪盜的陷阱 (10格連鎖, 20分)**！
            </p>
        </div>

        <div id="play-panel" style="display: none;">
            <h3>📡 第二階段：啟動雷達搜索</h3>
            
            <div id="play-reference" class="info-list"></div>

            <div class="stats">
                <div class="stat-item">尋回進度 (總分): <span id="score-display">0</span></div>
                <div class="stat-item">剩餘雷達電量 (步數): <span id="moves-display">0</span></div>
            </div>

            <div style="margin-bottom: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;">
                <div style="font-size: 14px; color: #f1c40f; margin-bottom: 5px;">【關主專用：為小隊充電】</div>
                <button class="gm-btn btn-win" onclick="addMoves(15)">🏆 闖關大勝 (+15步)</button>
                <button class="gm-btn btn-lose" onclick="addMoves(10)">💪 闖關失敗 (+10步)</button>
                <button class="gm-btn btn-secret" onclick="addMoves(5)">🕵️ 破解彩蛋 (+5步)</button>
                <button class="gm-btn btn-undo" onclick="addMoves(-5)">⏪ 扣除電量 (-5步)</button>
                <hr style="border-color: #7f8c8d; margin: 10px 0;">
                <button class="gm-btn btn-settle" onclick="manualSettle()">🛑 結束探索並公開剩餘位置</button>
            </div>

            <button onclick="restartGame()" style="background: transparent; border: 1px solid #e74c3c; color:#e74c3c; width:auto; padding: 8px 20px; margin-top: 5px;">重新一局 (清除存檔)</button>
        </div>
    </div>

    <div id="message"></div>
    
    <div id="board-container">
        <div id="board" onmouseleave="clearPreview()"></div>
    </div>

    <script>
        const LIMITS = {
            '🎤': 8, 
            '🎸': 6, 
            '🪕': 6, 
            '🎹': 5, 
            '🥁': 4,
            '📻': 3
        };

        const NAMES_AND_SIZES = {
            '🎤': '麥克風 (1x1)',
            '🎸': '電吉他 (2x1)',
            '🪕': '貝斯 (1x2)',
            '🎹': '電子琴 (3x1)',
            '🥁': '爵士鼓 (2x2)',
            '📻': '監聽音箱 (2x3)',
            '👾': '怪盜的陷阱 (10格連鎖)' 
        };

        const POINTS_MAP = {
            1: 1,   
            2: 3,   
            3: 6,   
            4: 10,  
            6: 15,  
            10: 20  
        };

        const SIZE = 15; 
        const SAVE_KEY = 'earthgame_save_data'; 
        const DEFAULT_MOVES = 0; 
        
        let board = [];
        let treasures = [];
        let phase = 'setup'; 
        let score = 0;
        let movesLeft = DEFAULT_MOVES; 
        let treasureIdCounter = 1;

        function addMoves(amount) {
            movesLeft += amount;
            if (movesLeft < 0) movesLeft = 0; 
            document.getElementById('moves-display').innerText = movesLeft;
            saveGame(); 
            
            if (amount > 0) {
                showMessage(`🔋 充電成功！獲得 ${amount} 單位電量，目前共有 ${movesLeft} 步可以掃描。`);
            } else {
                showMessage(`⏪ 已收回 ${Math.abs(amount)} 單位電量！目前剩下 ${movesLeft} 步。`);
            }
        }

        function manualSettle() {
            if(confirm("確定要立刻結算並公開所有怪盜藏匿點嗎？結算後將無法繼續搜索！")) {
                movesLeft = 0; 
                document.getElementById('moves-display').innerText = movesLeft;
                showMessage(`🛑 搜索行動結束！本次小隊共尋回價值 ${score} 分的樂器！`);
                endGameDisplay();
                clearSave(); 
            }
        }

        function updateInventoryUI() {
            if (phase !== 'setup') return;
            const inventoryDiv = document.getElementById('inventory-list');
            inventoryDiv.innerHTML = '<div class="inventory-header">📋 怪盜贓物清單 (庫存)</div>';
            
            for (let icon in LIMITS) {
                const limit = LIMITS[icon];
                const currentCount = treasures.filter(t => t.icon === icon).length;
                const nameStr = NAMES_AND_SIZES[icon];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item';
                if (currentCount >= limit) itemDiv.classList.add('limit-reached');
                itemDiv.innerHTML = `<span>${icon} ${nameStr}</span> <span>${currentCount} / ${limit}</span>`;
                inventoryDiv.appendChild(itemDiv);
            }
        }

        function updatePlayReferenceUI() {
            if (phase !== 'play') return;
            const refDiv = document.getElementById('play-reference');
            refDiv.innerHTML = '<div class="inventory-header">📡 探測器分析：遺失物列表</div>';
            
            let hiddenCounts = {};
            let foundCounts = {};
            
            treasures.forEach(t => {
                hiddenCounts[t.icon] = (hiddenCounts[t.icon] || 0) + 1;
                if (t.foundCount === t.size) {
                    foundCounts[t.icon] = (foundCounts[t.icon] || 0) + 1;
                }
            });

            for (let icon in hiddenCounts) {
                const total = hiddenCounts[icon];
                const found = foundCounts[icon] || 0;
                const nameStr = NAMES_AND_SIZES[icon];
                const pt = POINTS_MAP[treasures.find(t=>t.icon === icon).size];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'inventory-item';
                
                if (found === total) {
                    itemDiv.style.color = '#2ecc71';
                    itemDiv.style.fontWeight = 'bold';
                }
                itemDiv.innerHTML = `<span>${icon} ${nameStr} <small>(${pt}分)</small></span> <span>${found} / ${total}</span>`;
                refDiv.appendChild(itemDiv);
            }
        }

        function saveGame() {
            const gameState = { board, treasures, phase, score, movesLeft, treasureIdCounter };
            localStorage.setItem(SAVE_KEY, JSON.stringify(gameState));
        }

        function clearSave() { localStorage.removeItem(SAVE_KEY); }

        function restartGame() {
            if(confirm("確定要重啟特快車任務嗎？這會清除小隊目前的進度喔！")) {
                clearSave();
                location.reload();
            }
        }

        function initBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            board = [];
            for (let r = 0; r < SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    board[r][c] = { treasureId: 0, revealed: false };
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.onclick = () => handleCellClick(r, c);
                    cell.onmouseenter = () => handleCellHover(r, c);
                    boardDiv.appendChild(cell);
                }
            }
            updateInventoryUI(); 
        }

        function loadGameAndInit() {
            const savedData = localStorage.getItem(SAVE_KEY);
            if (savedData) {
                const state = JSON.parse(savedData);
                
                if (!state.board || state.board.length !== SIZE) {
                    initBoard();
                    return;
                }

                board = state.board;
                treasures = state.treasures;
                phase = state.phase;
                score = state.score;
                movesLeft = state.movesLeft;
                treasureIdCounter = state.treasureIdCounter;

                const boardDiv = document.getElementById('board');
                boardDiv.innerHTML = '';
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.id = `cell-${r}-${c}`;
                        cell.onclick = () => handleCellClick(r, c);
                        cell.onmouseenter = () => handleCellHover(r, c);

                        const cellData = board[r][c];
                        if (phase === 'setup' && cellData.treasureId !== 0) {
                            cell.classList.add('setup-treasure');
                            const treasure = treasures.find(t => t.id === cellData.treasureId);
                            if (treasure) cell.innerText = treasure.icon;
                        }

                        if (cellData.revealed) {
                            cell.classList.add('revealed');
                            if (cellData.treasureId === 0) {
                                cell.classList.add('miss');
                                const count = countAdjacentTreasures(r, c);
                                if (count > 0) {
                                    cell.innerText = count;
                                    cell.classList.add(`n${count}`);
                                }
                            } else {
                                cell.classList.add('hit');
                                const treasure = treasures.find(t => t.id === cellData.treasureId);
                                cell.innerText = treasure.icon;
                                if (treasure.foundCount === treasure.size) {
                                    cell.classList.add('completed');
                                }
                            }
                        }
                        boardDiv.appendChild(cell);
                    }
                }

                if (phase === 'play') {
                    document.getElementById('setup-panel').style.display = 'none';
                    document.getElementById('play-panel').style.display = 'block';
                    document.getElementById('score-display').innerText = score;
                    document.getElementById('moves-display').innerText = movesLeft;
                    updatePlayReferenceUI();
                    showMessage("📡 系統連線成功！自動恢復先前的搜索進度。");
                } else {
                    updateInventoryUI(); 
                    showMessage("🎵 歡迎回來！關主請繼續掩埋樂器。");
                }
            } else {
                initBoard();
            }
        }

        function clearPreview() {
            document.querySelectorAll('.preview-valid, .preview-invalid').forEach(el => {
                el.classList.remove('preview-valid', 'preview-invalid');
            });
        }

        function handleCellHover(r, c) {
            if (phase !== 'setup') return;
            clearPreview(); 

            if (board[r][c].treasureId !== 0) {
                const treasure = treasures.find(t => t.id === board[r][c].treasureId);
                if (treasure) treasure.cells.forEach(pos => document.getElementById(`cell-${pos.r}-${pos.c}`).classList.add('preview-invalid'));
                return;
            }

            const typeInfo = document.getElementById('treasure-type').value.split(',');
            const w = parseInt(typeInfo[0]); const h = parseInt(typeInfo[1]); const icon = typeInfo[2];

            let isValid = true;
            let cellsToPreview = [];
            if (treasures.filter(t => t.icon === icon).length >= LIMITS[icon]) isValid = false; 
            if (r + h > SIZE || c + w > SIZE) isValid = false;

            for (let i = 0; i < h; i++) {
                for (let j = 0; j < w; j++) {
                    if (r + i < SIZE && c + j < SIZE) {
                        cellsToPreview.push({r: r + i, c: c + j});
                        if (board[r + i][c + j].treasureId !== 0) isValid = false;
                    }
                }
            }

            cellsToPreview.forEach(pos => {
                const cellDiv = document.getElementById(`cell-${pos.r}-${pos.c}`);
                cellDiv.classList.add(isValid ? 'preview-valid' : 'preview-invalid');
            });
        }

        function handleCellClick(r, c) {
            if (phase === 'setup') {
                if (board[r][c].treasureId !== 0) removeTreasure(r, c);
                else placeTreasure(r, c);
            } else if (phase === 'play') revealCell(r, c);
        }

        function removeTreasure(r, c) {
            const treasureIndex = treasures.findIndex(t => t.id === board[r][c].treasureId);
            if (treasureIndex === -1) return;

            const treasure = treasures[treasureIndex];
            treasure.cells.forEach(pos => {
                board[pos.r][pos.c].treasureId = 0;
                const cellDiv = document.getElementById(`cell-${pos.r}-${pos.c}`);
                cellDiv.classList.remove('setup-treasure');
                cellDiv.innerText = ""; 
            });

            treasures.splice(treasureIndex, 1);
            showMessage(`🗑️ 已挖出 ${treasure.icon}，請重新選擇掩埋地點！`);
            updateInventoryUI(); 
            saveGame(); clearPreview(); handleCellHover(r, c); 
        }

        function placeTreasure(r, c) {
            const typeInfo = document.getElementById('treasure-type').value.split(',');
            const w = parseInt(typeInfo[0]); const h = parseInt(typeInfo[1]); const icon = typeInfo[2];        

            if (treasures.filter(t => t.icon === icon).length >= LIMITS[icon]) {
                showMessage(`❗ ${icon} 的數量已經達到上限！`); return;
            }
            if (r + h > SIZE || c + w > SIZE) { showMessage("❗ 超出荒野範圍了！"); return; }

            for (let i = 0; i < h; i++) {
                for (let j = 0; j < w; j++) {
                    if (board[r + i][c + j].treasureId !== 0) { showMessage("❗ 這裡已經埋了其他東西！"); return; }
                }
            }

            const newTreasure = { id: treasureIdCounter, icon: icon, cells: [], size: w * h, foundCount: 0 };
            for (let i = 0; i < h; i++) {
                for (let j = 0; j < w; j++) {
                    board[r + i][c + j].treasureId = treasureIdCounter;
                    newTreasure.cells.push({ r: r + i, c: c + j });
                    const cellDiv = document.getElementById(`cell-${r + i}-${c + j}`);
                    cellDiv.classList.add('setup-treasure');
                    cellDiv.innerText = icon; 
                }
            }

            treasures.push(newTreasure);
            treasureIdCounter++;
            showMessage(`✅ 成功隱藏 ${icon}！`);
            updateInventoryUI(); saveGame(); clearPreview(); handleCellHover(r, c); 
        }

        function getValidNeighbors(r, c, currentBlob) {
            let neighbors = [];
            const dirs = [[-1,0], [1,0], [0,-1], [0,1]]; 
            for (let d of dirs) {
                let nr = r + d[0]; let nc = c + d[1];
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                    if (board[nr][nc].treasureId === 0 && !currentBlob.some(b => b.r === nr && b.c === nc)) {
                        neighbors.push({r: nr, c: nc});
                    }
                }
            }
            return neighbors;
        }

        function placeRandomBlob(targetSize, icon) {
            let maxAttempts = 100;
            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                let startR = Math.floor(Math.random() * SIZE);
                let startC = Math.floor(Math.random() * SIZE);

                if (board[startR][startC].treasureId !== 0) continue;

                let blobCells = [{r: startR, c: startC}];
                let candidates = getValidNeighbors(startR, startC, blobCells);

                while (blobCells.length < targetSize && candidates.length > 0) {
                    let randIdx = Math.floor(Math.random() * candidates.length);
                    let nextCell = candidates[randIdx];

                    blobCells.push(nextCell);
                    candidates.splice(randIdx, 1);

                    let newNeighbors = getValidNeighbors(nextCell.r, nextCell.c, blobCells);
                    for (let nn of newNeighbors) {
                        if (!candidates.some(c => c.r === nn.r && c.c === nn.c)) {
                            candidates.push(nn);
                        }
                    }
                }

                if (blobCells.length === targetSize) {
                    const mysteryTreasure = { id: treasureIdCounter, icon: icon, cells: [], size: targetSize, foundCount: 0 };
                    blobCells.forEach(pos => {
                        board[pos.r][pos.c].treasureId = treasureIdCounter;
                        mysteryTreasure.cells.push({ r: pos.r, c: pos.c });
                    });
                    treasures.push(mysteryTreasure);
                    treasureIdCounter++;
                    return true;
                }
            }
            return false;
        }

        function startGame() {
            if (treasures.length === 0) { showMessage("⚠️ 請至少藏匿一個樂器！"); return; }

            const blobSuccess = placeRandomBlob(10, '👾');

            phase = 'play';
            document.getElementById('setup-panel').style.display = 'none';
            document.getElementById('play-panel').style.display = 'block';
            
            updatePlayReferenceUI();

            if (blobSuccess) {
                showMessage("🚨 任務開始！小隊必須解鎖步數才能開始尋寶。");
            } else {
                showMessage("🚨 任務開始！(空間過於擁擠，未生成怪盜陷阱)");
            }
            
            clearPreview(); 
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cellDiv = document.getElementById(`cell-${r}-${c}`);
                    cellDiv.classList.remove('setup-treasure');
                    cellDiv.innerText = ""; 
                }
            }
            saveGame(); 
        }

        function countAdjacentTreasures(r, c) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue; 
                    const nr = r + i; const nc = c + j;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        if (board[nr][nc].treasureId !== 0) count++;
                    }
                }
            }
            return count;
        }

        function revealCell(r, c) {
            if (movesLeft <= 0) {
                showMessage("⚠️ 雷達電量不足！請小隊先去完成關卡任務充電。");
                return;
            }
            if (board[r][c].revealed) return;

            board[r][c].revealed = true;
            movesLeft--;
            document.getElementById('moves-display').innerText = movesLeft;

            const cellDiv = document.getElementById(`cell-${r}-${c}`);
            cellDiv.classList.add('revealed');
            const tId = board[r][c].treasureId;

            if (tId === 0) {
                cellDiv.classList.add('miss');
                const count = countAdjacentTreasures(r, c);
                if (count > 0) {
                    cellDiv.innerText = count;
                    cellDiv.classList.add(`n${count}`); 
                } else cellDiv.innerText = "";
                showMessage("這裡只是一片空蕩蕩的草地...");
            } else {
                const treasure = treasures.find(t => t.id === tId);
                cellDiv.classList.add('hit');
                cellDiv.innerText = treasure.icon; 
                
                treasure.foundCount++;

                if (treasure.foundCount === treasure.size) {
                    const pt = POINTS_MAP[treasure.size];
                    score += pt;
                    document.getElementById('score-display').innerText = score;

                    if (treasure.icon === '👾') {
                        showMessage(`🔥 驚人發現！破解了 👾 怪盜的陷阱，一口氣奪回 ${pt} 分！`);
                    } else {
                        showMessage(`✨ 太棒了！順利尋回 ${treasure.icon} (+${pt} 分)`);
                    }

                    treasure.cells.forEach(pos => document.getElementById(`cell-${pos.r}-${pos.c}`).classList.add('completed'));
                    updatePlayReferenceUI();
                } else {
                    showMessage(`📡 雷達有反應！掃描到 ${treasure.icon} 的一部分了，繼續挖！`);
                }
            }

            checkGameOver();
        }

        function checkGameOver() {
            const allFound = treasures.every(t => t.foundCount === t.size);
            
            if (allFound) {
                showMessage(`🎊 奇蹟！所有樂器都找回來了！演唱會準備開始！最終得分：${score} 分！`);
                movesLeft = 0; 
                endGameDisplay();
                clearSave(); 
            } else {
                saveGame(); 
            }
        }
        
        function endGameDisplay() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (!board[r][c].revealed && board[r][c].treasureId !== 0) {
                        const cellDiv = document.getElementById(`cell-${r}-${c}`);
                        const treasure = treasures.find(t => t.id === board[r][c].treasureId);
                        cellDiv.innerText = treasure.icon; 
                        cellDiv.style.backgroundColor = "#2c3e50"; /* 結算時未找出的變暗 */
                        cellDiv.style.border = "1px solid #7f8c8d";
                    }
                }
            }
        }

        function showMessage(msg) { document.getElementById('message').innerText = msg; }

        loadGameAndInit();
    </script>
